naftiko: 1.0.0-alpha2
info:
  label: CBRE API
  description: CBRE provides APIs for commercial real estate data including property listings, market analytics, and facility
    management. The platform enables partners to access CBRE's real estate intelligence.
  tags:
  - Cbre
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: cbre
    baseUri: https://api.cbre.com
    description: CBRE API HTTP API.
    authentication:
      type: bearer
      token: '{{CBRE_TOKEN}}'
    resources:
    - name: status
      path: /status
      operations:
      - name: getstatus
        method: GET
        description: Get API status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: cbre-rest
    description: REST adapter for CBRE API.
    resources:
    - path: /status
      name: getstatus
      operations:
      - method: GET
        name: getstatus
        description: Get API status
        call: cbre.getstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: cbre-mcp
    transport: http
    description: MCP adapter for CBRE API for AI agent use.
    tools:
    - name: getstatus
      description: Get API status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cbre.getstatus
      outputParameters:
      - type: object
        mapping: $.
binds:
- namespace: env
  keys:
    CBRE_TOKEN: CBRE_TOKEN
