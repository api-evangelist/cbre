specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: CBRE
providerId: cbre
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Commercial Real Estate
  - Property Management
  - Facilities Management
  - Investment Management
  - Real Estate
description: CBRE Group, Inc. publishes property, analytics, facilities, and investment-management APIs
  through a partner-gated developer portal at developer.cbre.com. The portal is not publicly browsable
  (anonymous fetch is refused), and per-call API pricing is not published — API access is bundled with
  CBRE service contracts (asset / facilities / investment management) negotiated at the account level.
notes: developer.cbre.com is partner-gated and unavailable to anonymous fetch. No public per-call API
  pricing exists; access is bundled with CBRE service contracts.
sources:
  - https://developer.cbre.com/
  - https://www.cbre.com
plans:
  - id: cbre-developer-api
    name: CBRE Developer API (Service-Bundled)
    type: enterprise
    description: API access bundled with a CBRE asset / facilities / investment-management service contract.
      Direct API-only pricing is not published; engagement is via the CBRE account team.
    entries:
      - label: Bundled with CBRE service contract
        name: bundled_service
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: bundled with CBRE service contract
        userMultiplied: false
      - label: Standalone API access
        name: standalone_api
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact CBRE account team
        userMultiplied: false
    elements:
      - name: Property Search / Listing Management
      - name: Lease Administration
      - name: Market Analytics
      - name: Valuation
      - name: Facilities / Work Order Management
      - name: Space Utilization
      - name: Investment Management
      - name: Portfolio Reporting
      - name: Sustainability Metrics
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
