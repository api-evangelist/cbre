specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: CBRE
providerId: cbre
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Commercial Real Estate
  - Real Estate
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps scaffold for CBRE. CBRE invoices are dominated by service-line fees
  (transaction services, project management, facilities management, valuation, investment management);
  the API surface is bundled into those engagements. FinOps reporting tracks API consumption to allocate
  the bundled cost rather than to drive a per-call invoice.'
notes: Direct per-call API pricing is not published; cost is captured within the parent CBRE service
  contract.
sources:
  - https://developer.cbre.com/
  - https://www.cbre.com
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: CBRE Group, Inc.
serviceCategory: Commercial Real Estate Services
billingModel:
  pricingCategory: Service Contract (API Bundled)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: CBRE Developer API
  ServiceCategory: Commercial Real Estate Services
  ProviderName: CBRE
  PublisherName: CBRE Group, Inc.
  InvoiceIssuerName: CBRE Group, Inc.
  BillingCurrency: USD
meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - application
      - service_line
  - name: properties_under_management
    unit: property
    aggregation: count
    dimensions:
      - region
      - service_line
  - name: square_feet_managed
    unit: sqft
    aggregation: sum
    dimensions:
      - region
      - service_line
  - name: work_orders_processed
    unit: work_order
    aggregation: count
    dimensions:
      - region
principles:
  - name: Visibility
    description: Pair API call volume from the developer-portal application reports with the CBRE service-line
      invoice to see where consumption concentrates.
  - name: Allocation
    description: Allocate CBRE service fees to the property / portfolio they support; tag API calls with
      the same property identifier for consistency.
  - name: Optimization
    description: Cache market analytics that update at low cadence; pull facilities work-order data on
      change events rather than polling; consolidate reporting queries.
  - name: Accountability
    description: Real-estate leader owns CBRE service spend; integration platform owner ensures API consumption
      stays within the entitlement bundled into the contract.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
