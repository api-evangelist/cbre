specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: CBRE
providerId: cbre
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Commercial Real Estate
  - Real Estate
  - Rate Limiting
description: CBRE's developer portal at developer.cbre.com is partner-gated; rate-limit documentation
  is not publicly accessible. Limits are surfaced once a partner is onboarded and would typically apply
  per-application or per-account at the API gateway layer.
notes: Developer portal not anonymously reachable (host refused connection). Numeric limits are gated
  behind partner onboarding.
sources:
  - https://developer.cbre.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Partner-application rate / quota
    scope: application
    metric: varies
    limit: see CBRE developer portal once onboarded
policies:
  - name: Backoff
    description: On 429 / 503, retry with exponential backoff and jitter; honor Retry-After when present.
  - name: Account-scoped limits
    description: CBRE applies limits per partner application registered in the developer portal; multiple
      apps under one account allow segmenting throughput across consuming products.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
